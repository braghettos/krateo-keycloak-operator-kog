name: release-chart
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch: {}
permissions:
  contents: read
  packages: write
env:
  HELM_VERSION: v3.19.0
  CHART_DIR: chart
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}
      - name: helm lint
        run: helm lint "$CHART_DIR"
      - name: Verify git tag matches Chart.yaml version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="$GITHUB_REF_NAME"
          cv="$(awk '/^version:/ {print $2; exit}' "$CHART_DIR/Chart.yaml")"
          [ "$tag" = "$cv" ] || { echo "::error::tag $tag != chart version $cv"; exit 1; }
      - name: helm package
        run: helm package "$CHART_DIR" --destination dist
      - name: helm registry login (GHCR)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin
      - name: helm push
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          for tgz in dist/*.tgz; do helm push "$tgz" "oci://ghcr.io/${owner}/charts"; done
