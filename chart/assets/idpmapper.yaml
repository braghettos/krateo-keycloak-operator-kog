openapi: 3.0.3
info:
  title: Keycloak Admin API - Identity Provider Mapper (KOG subset)
  version: v1
  description: Hand-curated OpenAPI 3.0 subset of the Keycloak Admin REST API for the Identity Provider
    Mapper resource, sufficient to manage it through the Krateo Operator Generator (KOG). Declares the
    http/bearer security scheme that the upstream Keycloak OAS omits.
servers:
- url: '{{ .Values.keycloak.baseUrl }}'
  description: Keycloak base URL (no trailing slash).
security:
- bearer: []
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      description: Keycloak admin access token (OAuth2 Bearer).
  schemas:
    IdentityProviderMapperRepresentation:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: Mapper name. Natural key (findby).
        identityProviderAlias:
          type: string
          description: Parent IdP alias; must equal the {alias} path param.
        identityProviderMapper:
          type: string
          description: e.g. hardcoded-group-idp-mapper, oidc-username-idp-mapper
        config:
          type: object
          additionalProperties:
            type: string
        id:
          type: string
          description: Server-generated identifier (read-only).
          readOnly: true
paths:
  /admin/realms/{realm}/identity-provider/instances/{alias}/mappers:
    post:
      operationId: createIdpmapper
      summary: Create Identity Provider Mapper
      tags:
      - idpmapper
      parameters:
      - name: realm
        in: path
        required: true
        schema:
          type: string
      - name: alias
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityProviderMapperRepresentation'
      responses:
        '201':
          description: Created. Identifier returned via Location header.
    get:
      operationId: listIdpmapper
      summary: List/find Identity Provider Mapper
      tags:
      - idpmapper
      parameters:
      - name: realm
        in: path
        required: true
        schema:
          type: string
      - name: alias
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IdentityProviderMapperRepresentation'
  /admin/realms/{realm}/identity-provider/instances/{alias}/mappers/{id}:
    get:
      operationId: getIdpmapper
      summary: Get Identity Provider Mapper
      tags:
      - idpmapper
      parameters:
      - name: realm
        in: path
        required: true
        schema:
          type: string
      - name: alias
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityProviderMapperRepresentation'
    put:
      operationId: updateIdpmapper
      summary: Update Identity Provider Mapper
      tags:
      - idpmapper
      parameters:
      - name: realm
        in: path
        required: true
        schema:
          type: string
      - name: alias
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityProviderMapperRepresentation'
      responses:
        '204':
          description: Updated.
    delete:
      operationId: deleteIdpmapper
      summary: Delete Identity Provider Mapper
      tags:
      - idpmapper
      parameters:
      - name: realm
        in: path
        required: true
        schema:
          type: string
      - name: alias
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Deleted.
