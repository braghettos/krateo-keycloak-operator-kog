{{- if .Values.restDefinitions.authenticationexecution.enabled }}
apiVersion: ogen.krateo.io/v1alpha1
kind: RestDefinition
metadata:
  name: {{ .Release.Name }}-authenticationexecution
  labels:
    {{- include "keycloak-config-kog.labels" . | nindent 4 }}
  {{- if .Values.verbose }}
  annotations:
    krateo.io/connector-verbose: "true"
  {{- end }}
spec:
  oasPath: configmap://{{ .Release.Namespace }}/{{ .Release.Name }}-authenticationexecution/authenticationexecution.yaml
  resourceGroup: {{ .Values.resourceGroup }}
  resource:
    kind: {{ .Values.restDefinitions.authenticationexecution.kind }}
    # One execution (or subflow) that is a DIRECT child of the flow addressed by
    # `flowAlias` (top-level flow alias or subflow alias - aliases are realm-unique).
    # Keycloak's executions API is create-then-mutate (create at .../executions/execution,
    # requirement via PUT .../executions, ordering via raise/lower-priority move ops), so
    # the four lifecycle verbs are DELEGATED to Snowplow RESTActions via
    # observeApiRef/createApiRef/updateApiRef/deleteApiRef (see
    # templates/restactions-authenticationexecution.yaml and docs/ARCHITECTURE.md).
    # The OAS verbs below exist for CRD generation (create request body = spec shape)
    # and for the controller's level-based convergence requirement (findby).
    identifiers:
      - realm
      - flowAlias
      - provider
      - alias
      - subFlow
    additionalStatusFields:
      - id
      - requirement
      - index
      - level
      - found
      - configured
    verbsDescription:
      - action: create
        method: POST
        path: /admin/realms/{realm}/authentication/flows/{flowAlias}/executions/execution
      - action: findby
        method: GET
        path: /admin/realms/{realm}/authentication/flows/{flowAlias}/executions
    # Observe: list the parent flow's executions, select this one (level 0 +
    # provider / subflow alias), compose {found,id,requirement,index,level,configured}.
    observeApiRef:
      name: {{ .Release.Name }}-authenticationexecution-observe
      namespace: {{ .Release.Namespace }}
      # Absent => create (composes with createApiRef; the non-idempotent POST is
      # gated by this observe, so it only fires while the execution is missing).
      notFoundExpr:
        inline: '(.status.found // false) | not'
      # Drift => update: requirement mismatch, managed position mismatch, or a
      # declared-but-missing authenticator config (presence-only config check).
      upToDateExpr:
        inline: >-
          ((.status.requirement // "") == (.spec.requirement // "DISABLED"))
          and ((.spec.priority == null) or ((.status.index // -1) == .spec.priority))
          and ((.spec.config == null) or (.status.configured // false))
    createApiRef:
      name: {{ .Release.Name }}-authenticationexecution-create
      namespace: {{ .Release.Namespace }}
    updateApiRef:
      name: {{ .Release.Name }}-authenticationexecution-update
      namespace: {{ .Release.Namespace }}
    deleteApiRef:
      name: {{ .Release.Name }}-authenticationexecution-delete
      namespace: {{ .Release.Namespace }}
{{- end }}
