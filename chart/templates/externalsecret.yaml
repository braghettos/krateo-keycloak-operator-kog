{{- if .Values.auth.externalSecret.enabled }}
{{- /*
External Secrets Operator wiring for the short-lived Keycloak admin bearer token.

Flow:
  ESO Webhook generator --(POST client_credentials)--> Keycloak token endpoint
       |  extracts $.access_token
       v
  ExternalSecret --(every refreshInterval)--> Secret/<auth.secretName> (key: <auth.secretKey>)
       ^
       |  referenced by each <Kind>Configuration.spec.authentication.bearer.tokenRef
  rest-dynamic-controller

NOTE: ESO generator field names vary across ESO versions. Validated shape below
targets external-secrets >= 0.10. Adjust apiVersions if your cluster differs.
The service-account client (auth.clientId) must hold the `realm-management` roles
needed for the resources you manage (e.g. manage-clients, manage-realm, manage-users).
*/ -}}
apiVersion: generators.external-secrets.io/v1alpha1
kind: Webhook
metadata:
  name: {{ .Values.auth.externalSecret.generatorRef.name }}
  labels:
    {{- include "keycloak-config-kog.labels" . | nindent 4 }}
spec:
  url: {{ .Values.auth.externalSecret.tokenEndpoint | quote }}
  method: POST
  headers:
    Content-Type: application/x-www-form-urlencoded
  # `.clientSecret` is injected from the secret referenced under `secrets:` below.
  body: "grant_type=client_credentials&client_id={{ .Values.auth.externalSecret.clientId }}&client_secret={{ `{{ .clientSecret }}` }}"
  secrets:
    - name: clientSecret
      secretRef:
        name: {{ .Values.auth.externalSecret.clientSecretRef.name }}
        key: {{ .Values.auth.externalSecret.clientSecretRef.key }}
  result:
    jsonPath: "$.access_token"
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.auth.secretName }}
  labels:
    {{- include "keycloak-config-kog.labels" . | nindent 4 }}
spec:
  # Keep this BELOW the Keycloak access-token lifespan so the bearer never goes stale.
  refreshInterval: {{ .Values.auth.externalSecret.refreshInterval | quote }}
  target:
    name: {{ .Values.auth.secretName }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        {{ .Values.auth.secretKey }}: "{{ `{{ .access_token }}` }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: {{ .Values.auth.externalSecret.generatorRef.apiVersion }}
          kind: {{ .Values.auth.externalSecret.generatorRef.kind }}
          name: {{ .Values.auth.externalSecret.generatorRef.name }}
{{- end }}
