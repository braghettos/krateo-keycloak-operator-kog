{{- if .Values.restDefinitions.client.enabled }}
apiVersion: ogen.krateo.io/v1alpha1
kind: RestDefinition
metadata:
  name: {{ .Release.Name }}-client
  labels:
    {{- include "keycloak-config-kog.labels" . | nindent 4 }}
  {{- if .Values.verbose }}
  annotations:
    krateo.io/connector-verbose: "true"
  {{- end }}
spec:
  oasPath: configmap://{{ .Release.Namespace }}/{{ .Release.Name }}-client/client.yaml
  resourceGroup: {{ .Values.resourceGroup }}
  resource:
    kind: {{ .Values.restDefinitions.client.kind }}
    # `clientId` is the user-supplied natural key; Keycloak addresses the
    # resource by a server-generated UUID. `findby` lists the collection and
    # matches clientId to resolve {id} (written to status) for get/update/delete.
    identifiers:
      - clientId
    additionalStatusFields:
      - id
    # `id` is the server-generated UUID: it is a required path param on
    # get/update/delete but must NOT be a user-set spec field. Exclude it from
    # the spec and source it from status (populated by findby) via
    # requestFieldMapping. {realm} stays a normal (required) spec field.
    # NOTE: path params must be declared at the OPERATION level in the OAS asset
    # — oasgen-provider ignores path-item-level parameters.
    excludedSpecFields:
      - id
    verbsDescription:
      - action: findby
        method: GET
        path: /admin/realms/{realm}/clients
      - action: create
        method: POST
        path: /admin/realms/{realm}/clients
      - action: get
        method: GET
        path: /admin/realms/{realm}/clients/{id}
        requestFieldMapping:
          - inPath: id
            inCustomResource: status.id
      - action: update
        method: PUT
        path: /admin/realms/{realm}/clients/{id}
        requestFieldMapping:
          - inPath: id
            inCustomResource: status.id
      - action: delete
        method: DELETE
        path: /admin/realms/{realm}/clients/{id}
        requestFieldMapping:
          - inPath: id
            inCustomResource: status.id
{{- end }}
